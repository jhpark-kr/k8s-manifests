apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: dev-nodepool
spec:
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"] # 비용 아끼기 위해 스팟 전용 설정
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["t"] # dev는 가성비 좋은 t 계열(t3.medium 등)만 허용
      nodeClassRef:
        name: default-ec2nodeclass
---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default-ec2nodeclass
spec:
  amiFamily: AL2
  subnetSelectorTerms:
    - tags:
        alpha.eksctl.io/cluster-name: "eks-1hour-lab"
  securityGroupSelectorTerms:
    - tags:
        alpha.eksctl.io/cluster-name: "eks-1hour-lab"
  role: "KarpenterNodeRole-eks-1hour-lab"